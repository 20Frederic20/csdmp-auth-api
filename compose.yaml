services:
  postgres:
    image: 'postgres:16-alpine'
    env_file:
      - .env.db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    volumes:
      - .:/app
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: